specVersion: "4.0"
metadata:
  name: "ui5.sales"
type: application
framework:
  name: OpenUI5
  version: "1.148.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f
    - name: sap.uxap
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: ui5-middleware-simpleproxy
      afterMiddleware: compression
      mountPath: /odata
      configuration:
        baseUri: "http://localhost:4004"
