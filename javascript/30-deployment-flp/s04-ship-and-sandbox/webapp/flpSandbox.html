<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Sales Order Management - Launchpad</title>
	<script type="text/javascript">
		window["sap-ushell-config"] = {
			defaultRenderer: "fiori2",
			applications: {
				"SalesOrder-display": {
					title: "Sales Orders",
					description: "Manage sales orders",
					additionalInformation: "SAPUI5.Component=ui5.sales",
					applicationType: "URL",
					url: "../"
				}
			}
		};
	</script>
	<script src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js"></script>
	<script id="sap-ui-bootstrap" src="https://ui5.sap.com/resources/sap-ui-core.js"
		data-sap-ui-libs="sap.m, sap.ushell"
		data-sap-ui-compatVersion="edge"
		data-sap-ui-theme="sap_horizon"
		data-sap-ui-frameOptions="allow"
		data-sap-ui-bindingSyntax="complex"
		data-sap-ui-async="true"></script>
	<script type="text/javascript">
		sap.ui.getCore().attachInit(() => {
			sap.ushell.Container.createRenderer().placeAt("content");
		});
	</script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
