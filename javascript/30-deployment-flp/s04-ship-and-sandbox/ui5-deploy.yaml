# Deployment descriptor (example: ABAP repository via @sap/ux-ui5-tooling).
# The free, open-source path is to host the built dist/ on any static web server.
specVersion: "4.0"
metadata:
  name: "ui5.sales"
type: application
builder:
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my-abap-system.example.com:44300
          client: "100"
        app:
          name: ZUI5_SALES
          package: ZSALES_PKG
          transport: NPLK900000
        exclude:
          - /test/
